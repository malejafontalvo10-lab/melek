<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Panel Admin — MELEK NAKIŞ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700&family=Fraunces:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body class="admin-body">

  <!-- LOGIN -->
  <section id="adminLogin" class="admin-screen">
    <form id="adminLoginForm" class="admin-login-card" autocomplete="off">
      <h1 class="admin-login-title">Panel Admin</h1>
      <p class="admin-login-sub">MELEK NAKIŞ — acceso restringido</p>
      <label class="admin-field">
        <span>Correo</span>
        <input type="email" id="admin-email" required autocomplete="username" />
      </label>
      <label class="admin-field">
        <span>Contraseña</span>
        <input type="password" id="admin-password" required autocomplete="current-password" />
      </label>
      <p id="adminLoginError" class="admin-error"></p>
      <button type="submit" id="adminLoginSubmit" class="admin-btn admin-btn-primary admin-btn-block">Ingresar</button>
    </form>
  </section>

  <!-- NO AUTORIZADO -->
  <section id="adminUnauthorized" class="admin-screen is-hidden">
    <div class="admin-login-card">
      <h1 class="admin-login-title">Sin acceso</h1>
      <p class="admin-login-sub">Esta cuenta no tiene permisos de administrador.</p>
      <button id="adminUnauthorizedLogout" class="admin-btn admin-btn-primary admin-btn-block">Volver a intentar</button>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="adminDashboard" class="admin-screen admin-dashboard is-hidden">
    <header class="admin-header">
      <div>
        <h1 class="admin-title">Pedidos</h1>
        <p class="admin-live"><span id="adminLiveDot" class="admin-live-dot"></span> Actualización en vivo</p>
      </div>
      <button id="adminLogoutBtn" class="admin-btn admin-btn-ghost">Cerrar sesión</button>
    </header>

    <div class="admin-toolbar">
      <div class="admin-filters">
        <button class="admin-filter-btn active" data-filter="all">Todos</button>
        <button class="admin-filter-btn" data-filter="pending">Pendientes</button>
        <button class="admin-filter-btn" data-filter="paid">Pagados</button>
        <button class="admin-filter-btn" data-filter="shipped">Enviados</button>
        <button class="admin-filter-btn" data-filter="failed">Fallidos</button>
        <button class="admin-filter-btn" data-filter="cancelled">Cancelados</button>
      </div>
      <input type="search" id="adminSearch" class="admin-search" placeholder="Buscar por nombre, teléfono o # pedido" />
    </div>

    <div id="ordersAdminList" class="admin-orders-list">
      <p class="admin-empty">Cargando pedidos...</p>
    </div>
  </section>

  <!-- MODAL: MARCAR COMO ENVIADO -->
  <div id="shipModal" class="admin-modal-backdrop is-hidden">
    <form id="shipForm" class="admin-modal">
      <h2 class="admin-modal-title">Marcar como enviado</h2>
      <label class="admin-field">
        <span>Transportadora</span>
        <input type="text" id="shipTransportadora" placeholder="Ej: Servientrega, Interrapidísimo" />
      </label>
      <label class="admin-field">
        <span>Número de guía *</span>
        <input type="text" id="shipGuia" required />
      </label>
      <div class="admin-modal-actions">
        <button type="button" id="shipCancel" class="admin-btn admin-btn-ghost">Cancelar</button>
        <button type="submit" id="shipSubmit" class="admin-btn admin-btn-primary">Confirmar envío</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabaseClient.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
